name: wishlist
description: "Application de gestion de contacts avec backend FastAPI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ──────────────────────────────
  # API & SÉCURITÉ (remplace SQLite + SharedPreferences)
  # ──────────────────────────────
  http: ^1.2.2                    # Pour appeler le backend FastAPI
  flutter_secure_storage: ^9.2.2   # Stockage sécurisé du token JWT (beaucoup mieux que SharedPreferences)

  # ──────────────────────────────
  # À supprimer plus tard (quand tout sera migré vers le backend)
  # ──────────────────────────────
  # shared_preferences: ^2.1.0     # Plus utilisé pour l'auth
  # sqflite: ^2.3.0                # Plus utilisé
  # path: ^1.9.0                    # Plus utilisé

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

